name: Run Edge IQ Model

on:
  schedule:
    # Run at 11 AM EDT (3 PM UTC) daily when games start
    - cron: '0 15 * * *'
    # Run at 6 PM EDT (10 PM UTC) to collect results
    - cron: '0 22 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/run_model.yml'

# Grant write access to the built-in GITHUB_TOKEN so the auto-commit
# step can push generated data files back to the repository.  Without
# this block the default token is read-only and every push returns 403.
permissions:
  contents: write

# Serialize runs on the same branch so two triggers firing close together
# (e.g. a scheduled run overlapping a manual workflow_dispatch, or a push
# to backend/** landing mid-run) queue up instead of racing to push the
# same branch, which is what caused intermittent "Commit predictions"
# failures. Queued runs still execute in full -- cancel-in-progress stays
# false so a queued run never clobbers one already writing data.
concurrency:
  group: run-model-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-predictions:
    if: github.event.schedule == '0 15 * * *' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Persist credentials so subsequent git commands can push.
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run model predictions
        run: python backend/model.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run game-line predictions (moneyline/spread/total)
        run: python backend/game_model.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update precision tracking
        run: python backend/precision_k.py

      - name: Commit predictions
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage generated data files (|| true so the step never fails
          # when a path glob matches nothing).
          git add data/predictions.json || true
          git add data/game_predictions.json || true
          git add "data/history/*.json" || true
          # Only commit when there are actual changes.
          if git diff-index --quiet HEAD; then
            echo "No changes to commit - skipping push."
          else
            git commit -m "chore: update predictions $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Use the HTTPS remote that actions/checkout already configured
            # with the GITHUB_TOKEN credential. Retry if another run snuck
            # a push in between our checkout and this push (belt-and-
            # suspenders alongside the concurrency group above) -- these
            # are all regenerated-daily data files, so on conflict our
            # just-computed version is what should win.
            for i in 1 2 3 4 5; do
              if git push origin HEAD:${{ github.ref_name }}; then
                break
              fi
              echo "Push rejected, merging latest remote (attempt $i)..."
              git fetch origin ${{ github.ref_name }}
              git merge -X ours --no-edit origin/${{ github.ref_name }}
              sleep 3
            done
          fi

  collect-results:
    if: github.event.schedule == '0 22 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Collect game results
        run: python backend/collect_results.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Train/adjust model
        run: python backend/train_model.py
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Collect game-line results (final scores/hits/innings)
        run: python backend/collect_game_results.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Grade game-line predictions and update moneyline calibration
        run: python backend/grade_game_predictions.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Archive old season data
        run: python backend/archive_season.py

      - name: Commit results and model updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "data/results/*.json"       || true
          git add data/model_weights.json     || true
          git add data/training_log.json      || true
          git add "data/game_results/*.json"  || true
          git add data/game_accuracy_log.json || true
          git add data/game_model_weights.json || true
          if git diff-index --quiet HEAD; then
            echo "No changes to commit - skipping push."
          else
            git commit -m "chore: update results and model weights $(date -u +'%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3 4 5; do
              if git push origin HEAD:${{ github.ref_name }}; then
                break
              fi
              echo "Push rejected, merging latest remote (attempt $i)..."
              git fetch origin ${{ github.ref_name }}
              git merge -X ours --no-edit origin/${{ github.ref_name }}
              sleep 3
            done
          fi
